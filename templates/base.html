<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Cloud RISC-V{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-brand"><span class="logo">⚡</span> Cloud RISC-V</div>
      <ul class="nav-links">
        <li>
          <a href="/" class="{% if request.path == '/' %}active{% endif %}"
            >Dashboard</a
          >
        </li>
        <li>
          <a
            href="/nodes"
            class="{% if request.path == '/nodes' %}active{% endif %}"
            >Nodes</a
          >
        </li>
        <li>
          <a
            href="/tasks"
            class="{% if request.path == '/tasks' %}active{% endif %}"
            >Tasks</a
          >
        </li>
        <li>
          <a
            href="/logs"
            class="{% if request.path == '/logs' %}active{% endif %}"
            >Logs</a
          >
        </li>
      </ul>
    </nav>

    <main class="container">{% block content %}{% endblock %}</main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
