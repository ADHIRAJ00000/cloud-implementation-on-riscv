{% extends "base.html" %} {% block title %}Logs - Cloud RISC-V{% endblock %} {%
block content %}
<div class="page-header">
  <h1>System Logs</h1>
  <button class="btn" onclick="loadLogs()">🔄 Refresh</button>
</div>

<div class="card">
  <div id="logs-container" class="logs-list">
    <p class="empty-state">Loading logs...</p>
  </div>
</div>

<script>
  async function loadLogs() {
    try {
      const logs = await fetch("/api/logs").then((r) => r.json());
      const container = document.getElementById("logs-container");

      if (logs.length === 0) {
        container.innerHTML = '<p class="empty-state">No logs yet.</p>';
        return;
      }

      container.innerHTML = logs
        .map(
          (log) => `
            <div class="log-item ${log.type}">
                <span class="log-time">${new Date(
                  log.timestamp
                ).toLocaleString()}</span>
                <span class="log-type ${
                  log.type
                }">${log.type.toUpperCase()}</span>
                <span class="log-message">${log.message}</span>
            </div>
        `
        )
        .join("");
    } catch (err) {
      console.error("Failed to load logs:", err);
    }
  }

  loadLogs();
  setInterval(loadLogs, 5000);
</script>
{% endblock %}
